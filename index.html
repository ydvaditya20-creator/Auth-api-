<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Gemini Chatroom</title>
    
    <!-- Firebase SDK v10+ (Using Compat Version for simple HTML integration) -->
    <!-- Firebase SDK v10 (Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        .btn { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; margin-top: 15px; }
        .login-btn { background-color: #4285F4; color: white; }
        .send-btn { background-color: #1a73e8; color: white; }
        .logout-btn { background-color: #d93025; color: white; padding: 5px 10px; font-size: 12px; width: auto; float: right; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #333; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        .output { margin-top: 15px; padding: 12px; background: #f8f9fa; border-left: 4px solid #1a73e8; border-radius: 4px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }
        .hidden { display: none; }
        .user-info { font-size: 14px; color: #555; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gemini Public Workspace</h2>

    <!-- STEP 1: LOGIN SECTION -->
    <div id="login-section">
        <p style="text-align: center; color: #666;">Login with Google to start chatting with Gemini using your own API key quota.</p>
        <button class="btn login-btn" onclick="loginWithGoogle()">Sign in with Google</button>
    </div>

    <!-- STEP 2: CHAT SECTION -->
    <div id="chat-section" class="hidden">
        <button class="btn logout-btn" onclick="logout()">Logout</button>
        <div class="user-info" id="user-display">Welcome!</div>

        <label for="apiKey">Enter Your Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." onchange="saveKey()">
        <small style="color: #666;">Get a free key from <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a></small>

        <label for="prompt" style="margin-top: 20px;">Your Message:</label>
        <textarea id="prompt" rows="3" placeholder="Type your question here..."></textarea>

        <button class="btn send-btn" onclick="askGemini()">Ask Gemini</button>

        <label style="margin-top: 15px;">Response:</label>
        <div id="output" class="output">Response will appear here...</div>
    </div>
</div>

<script>
    // TODO: अपनी Firebase प्रोजेक्ट की डिटेल्स यहाँ डालें
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBjJyRekFD0NstoVf0hqvxUIbY8w5EVB-Q",
  authDomain: "apiauth-62fae.firebaseapp.com",
  projectId: "apiauth-62fae",
  storageBucket: "apiauth-62fae.firebasestorage.app",
  messagingSenderId: "409267960003",
  appId: "1:409267960003:web:ac1a811566f54999d24a76",
  measurementId: "G-57FLCPS6CE"
};

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // Monitor Auth State (Check if user is logged in)
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = `Logged in as: ${user.displayName} (${user.email})`;
            
            // Auto-load saved API key if exists
            if(localStorage.getItem('gemini_api_key')) {
                document.getElementById('apiKey').value = localStorage.getItem('gemini_api_key');
            }
        } else {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('chat-section').classList.add('hidden');
        }
    });

    // Google Login Function
    function loginWithGoogle() {
        auth.signInWithPopup(provider).catch(error => {
            alert("Login Failed: " + error.message);
        });
    }

    // Logout Function
    function logout() {
        auth.signOut();
    }

    // Save API key locally in user's browser
    function saveKey() {
        const key = document.getElementById('apiKey').value.trim();
        localStorage.setItem('gemini_api_key', key);
    }

    // Call Gemini API using User's Personal Key
    async function askGemini() {
    const apiKey = document.getElementById("apiKey").value.trim();
    const prompt = document.getElementById("prompt").value.trim();
    const output = document.getElementById("output");

    if (!apiKey) {
        output.innerText = "❌ Please enter your Gemini API Key.";
        return;
    }

    if (!prompt) {
        output.innerText = "❌ Please enter a message.";
        return;
    }

    output.innerText = "⏳ Thinking...";

    // Latest model (change if Google updates it)
    const MODEL = "models/gemini-2.5-flash-image";

    const url =
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;

    try {

        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contents: [
                    {
                        parts: [
                            {
                                text: prompt
                            }
                        ]
                    }
                ]
            })
        });

        const data = await response.json();

        if (!response.ok) {
            output.innerText =
                "❌ API Error\n\n" +
                (data.error?.message || JSON.stringify(data, null, 2));
            return;
        }

        if (
            data.candidates &&
            data.candidates.length > 0 &&
            data.candidates[0].content &&
            data.candidates[0].content.parts &&
            data.candidates[0].content.parts.length > 0
        ) {
            output.innerText =
                data.candidates[0].content.parts
                    .map(part => part.text || "")
                    .join("");
        }
        else if (
            data.candidates &&
            data.candidates[0].finishReason === "SAFETY"
        ) {
            output.innerText =
                "⚠️ Gemini blocked this response because of safety policies.";
        }
        else {
            output.innerText =
                "⚠️ No response received.\n\n" +
                JSON.stringify(data, null, 2);
        }

    } catch (err) {
        output.innerText =
            "❌ Network Error\n\n" + err.message;
    }
}
</script>

</body>
</html>
