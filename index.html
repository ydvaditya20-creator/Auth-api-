<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI इमेज जनरेटर</title>
    
    <script src="https://google.com" async defer></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        body { background: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 16px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #2d2d2d; }
        h2 { margin-bottom: 10px; color: #bb86fc; font-size: 24px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        textarea { width: 100%; height: 110px; padding: 14px; background: #2d2d2d; border: 1px solid #444; border-radius: 10px; color: white; font-size: 16px; margin-bottom: 20px; resize: none; display: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #03dac6; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-login { background: #4285F4; color: white; box-shadow: 0 4px 12px rgba(66,133,244,0.3); }
        .btn-login:hover { background: #357ae8; }
        .btn-gen { background: #03dac6; color: #000; display: none; box-shadow: 0 4px 12px rgba(3,218,198,0.3); }
        .btn-gen:hover { background: #01bfa5; }
        .btn-gen:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; }
        .loader { display: none; margin: 25px auto; border: 4px solid #333; border-top: 4px solid #03dac6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .img-box { margin-top: 25px; display: none; text-align: left; }
        .img-box p { color: #03dac6; font-size: 14px; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .img-box img { width: 100%; border-radius: 10px; border: 2px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="card">
    <h2>AI इमेज जनरेटर 🎨</h2>
    <p id="status" class="subtitle">शुरुआत करने के लिए अपने Google अकाउंट से लॉगिन करें</p>
    
    <!-- गूगल लॉगिन बटन -->
    <button id="loginBtn" class="btn-login" onclick="startLogin()">Google से लॉगिन करें</button>
    
    <!-- इनपुट बॉक्स और जनरेट बटन (लॉगिन के बाद एक्टिव होंगे) -->
    <textarea id="promptInput" placeholder="अपना आइडिया इंग्लिश में लिखें...&#10;(उदा: 'A cute orange cat wearing a tiny space helmet on mars')"></textarea>
    <button id="genBtn" class="btn-gen" onclick="makeAIImage()">इमेज जनरेट करें ✨</button>
    
    <!-- लोडिंग एनीमेशन -->
    <div id="loader" class="loader"></div>
    
    <!-- इमेज डिस्प्ले बॉक्स -->
    <div id="imgBox" class="img-box">
        <p>आपकी AI इमेज तैयार है! 🎉</p>
        <img id="outputImg" src="" alt="AI Generated Output">
    </div>
</div>

<script>
    // ⚠️ यहाँ अपनी असली GOOGLE CLIENT ID पेस्ट करें (कोटेशन मार्क्स के अंदर)
    const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_://googleusercontent.com'; 
    let userToken = null;

    // 1. पेज लोड होते ही गूगल आइडेंटिटी क्लाइंट को सेटअप करना
    window.onload = function () {
        if (GOOGLE_CLIENT_ID.includes('YOUR_GOOGLE_CLIENT_ID')) {
            console.warn("कृपया कोड में अपनी असली Google Client ID डालें!");
        }
        
        try {
            window.tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'https://googleapis.com',
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        userToken = tokenResponse.access_token;
                        setupUserInterface();
                    }
                },
            });
        } catch (err) {
            console.error("गूगल लाइब्रेरी लोड करने में त्रुटि:", err);
        }
    };

    // 2. लॉगिन बटन दबाने पर गूगल ऑथेंटिकेशन पॉपअप खोलना
    function startLogin() { 
        if (window.tokenClient) {
            window.tokenClient.requestAccessToken(); 
        } else {
            alert("गूगल सर्विस लोड हो रही है, कृपया एक सेकंड रुकें।");
        }
    }

    // 3. लॉगिन सफल होने के बाद स्क्रीन का इंटरफेस बदलना
    function setupUserInterface() {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('status').innerText = "लॉगिन सफल! अब अपना प्रॉम्ट लिखकर इमेज बनाएं।";
        document.getElementById('status').style.color = "#03dac6";
        document.getElementById('promptInput').style.display = 'block';
        document.getElementById('genBtn').style.display = 'block';
    }

    // 4. यूजर के टोकन का इस्तेमाल करके सीधे Gemini API से इमेज मंगाना
    async function makeAIImage() {
        const promptText = document.getElementById('promptInput').value.trim();
        if(!promptText) {
            alert("कृपया पहले टेक्स्ट बॉक्स में कोई प्रॉम्ट लिखें!");
            return;
        }

        const genButton = document.getElementById('genBtn');
        const loaderSpin = document.getElementById('loader');
        const imageResultBox = document.getElementById('imgBox');

        // बटन को लॉक करना और लोडिंग दिखाना
        genButton.disabled = true;
        loaderSpin.style.display = 'block';
        imageResultBox.style.display = 'none';

        try {
            // यूजर ड्रिवेन बिलिंग मॉडल के तहत सीधे गूगल जेमिनी इमेज एपीआई को हिट करना
            const response = await fetch(`https://googleapis.com`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${userToken}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }],
                    generationConfig: { responseModalities: ["IMAGE"] }
                })
            });

            const responseData = await response.json();
            
            // रिस्पॉन्स में से बेस64 इमेज डेटा निकालना
            const parts = responseData?.candidates?.[0]?.content?.parts;
            const inlineData = parts?.find(p => p.inlineData)?.inlineData;

            if(inlineData && inlineData.data) {
                document.getElementById('outputImg').src = `data:${inlineData.mimeType};base64,${inlineData.data}`;
                imageResultBox.style.display = 'block';
            } else {
                alert("गूगल एपीआई से इमेज नहीं मिल सकी। कृपया प्रॉम्ट बदलकर दोबारा कोशिश करें।");
            }
        } catch (error) {
            console.error("इमेज जनरेशन एरर:", error);
            alert("कुछ तकनीकी गड़बड़ी हुई! कृपया इंटरनेट कनेक्शन चेक करें या दोबारा लॉगिन करें।");
        } finally {
            // सब पूरा होने पर बटन अनलॉक करना और लोडिंग हटाना
            genButton.disabled = false;
            loaderSpin.style.display = 'none';
        }
    }
</script>
</body>
</html>
